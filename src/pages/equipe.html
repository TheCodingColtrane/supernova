<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Equipe - Hierarquia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --main: #7c3aed;
            --main-hover: #8f59ee;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
        }

        .container-equipe {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        /* Card Principal */
        .card-gestao {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            display: block;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-finish {
            background: var(--main);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-next {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background: var(--primary-hover);
        }

        .btn-finish:hover {
            background: var(--main-hover);
        }

        /* Lista de Subordinados */
        .subordinates-list {
            margin-top: 2rem;
            list-style: none;
        }

        .subordinate-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fcfcfc;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .subordinate-info {
            display: flex;
            flex-direction: column;
        }

        .subordinate-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .subordinate-role,
        .subordinate-start,
        .subordinate-end {
            font-size: 0.75rem;
            color: var(--text-muted);
        }


        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border: 2px dashed var(--border);
            border-radius: 12px;
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-header {
            margin-bottom: 1rem;
            display: none;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all .2s ease;
        }

        .back-button:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .back-button span:first-child {
            font-size: 1.2rem;
        }

      
    </style>
</head>

<body>
    <div class="container-equipe">

        <header>
            <h2>Configuração de Hierarquia</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Vincule novos colaboradores aos seus respectivos
                gestores</p>
        </header>
        <div class="card-gestao">
            <div class="card-header">
                <button class="back-button" id="backBtn">
                    <span>←</span>
                    <span>Voltar</span>
                </button>
            </div>
            <span class="section-title">Vínculo de Funcionários</span>
            <div class="form-group" id="defenders-area">
                <label for="defenderSelect">Quem é você ?</label>
                <select id="defenderSelect">
                    <option value="">-- Escolha um defensor --</option>
                </select>
                <div class="form-group">
                    <label for="defenderEmail">E-mail</label>
                    <input type="email" id="defenderEmail" placeholder="dpmg@defensoria.mg.def.br">
                </div>
                <button class="btn-next" id="btnNextStep">Prosseguir</button>
            </div>
            <div id="registrationArea" style="display: none;">
                <div class="form-group">
                    <label for="subordinateRole">Atribuição</label>
                    <select id="roleSelect">
                        <option value="0">Estagiário(a)</option>
                        <option value="1">Servidor(a)</option>
                        <option value="2">Defensor(a)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="subordinateName">Nome</label>
                    <input type="text" id="subordinateName" placeholder="João Pedro">
                </div>
                <div class="form-group">
                    <label for="subordinateEmail">E-mail</label>
                    <input type="email" id="subordinateEmail" placeholder="dpmg@defensoria.mg.def.br">
                </div>
                <div id="internContractInfo">
                    <div class="form-group">
                        <label for="subordinateStartDate">Data de início</label>
                        <input type="text" id="subordinateStartDate" maxlength="10">
                    </div>
                    <div class="form-group">
                        <label for="subordinateEndDate">Data fim </label>
                        <input type="text" id="subordinateEndDate" maxlength="10">
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-add" id="saveBtn">Vincular</button>
                    <button class="btn-finish" id="finishBtn">Concluir Cadastro</button>
                </div>


                <div class="subordinates-list" id="listContainer">
                    <span class="section-title">Subordinados Atuais</span>
                    <div id="subList">
                        <div class="empty-state">Nenhum subordinado vinculado a este gestor.</div>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="../eclipse/office/index.ts"></script>
</body>

</html>
